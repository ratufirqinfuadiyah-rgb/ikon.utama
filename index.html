<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');

        :root {
            --navy: #0a192f;
            --baby-blue: #7dd3fc;
            --white: #ffffff;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--white);
            color: var(--navy);
            overflow-x: hidden;
        }

        /* Hover Scale Effect for Thumbnails */
        .project-card {
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .project-card img {
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .project-card:hover img {
            transform: scale(1.12);
        }

        /* Glass Navigation */
        .glass-nav {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(15, 23, 42, 0.05);
        }

        .hero-overlay {
            background: linear-gradient(90deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-hero-bg { animation: fadeInScale 1.5s ease-out forwards; }

        /* Shared Element Transition Helpers */
        ::view-transition-old(project-image),
        ::view-transition-new(project-image) {
            animation: none;
            mix-blend-mode: normal;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--white); }
        ::-webkit-scrollbar-thumb { background: var(--navy); border-radius: 10px; }
    </style>
</head>

        function renderFooterMarkup() {

        // --- Lightbox Logic ---
        let currentGallery = [];
        let currentIndex = 0;

        function openLightbox(projectId, index) {
            const project = projects.find(p => p.id === projectId);
            if(!project) return;
            
            // Gabungkan foto sampul dan foto sekunder menjadi satu galeri
            currentGallery = [project.image, ...project.secondaryImages];
            currentIndex = index;
            
            updateLightboxImage();
            
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightbox-total').textContent = currentGallery.length;
            
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex'); // Menambahkan class flex secara eksplisit
            
            // Memicu reflow browser agar animasi transisi bekerja
            void lightbox.offsetWidth; 
            lightbox.classList.remove('opacity-0');
            lightbox.classList.add('opacity-100');
            document.getElementById('lightbox-img').classList.remove('scale-95');
            document.getElementById('lightbox-img').classList.add('scale-100');
            
            document.body.style.overflow = 'hidden'; // Mencegah scrolling saat pop-up terbuka
            document.addEventListener('keydown', handleLightboxKey);
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('opacity-100');
            lightbox.classList.add('opacity-0');
            document.getElementById('lightbox-img').classList.remove('scale-100');
            document.getElementById('lightbox-img').classList.add('scale-95');
            
            setTimeout(() => {
                lightbox.classList.remove('flex'); // Menghapus class flex kembali
                lightbox.classList.add('hidden');
                document.body.style.overflow = '';
            }, 300);
            
            document.removeEventListener('keydown', handleLightboxKey);
        }

        function updateLightboxImage() {
            const img = document.getElementById('lightbox-img');
            const counter = document.getElementById('lightbox-counter');
            
            img.style.opacity = '0';
            setTimeout(() => {
                img.src = currentGallery[currentIndex];
                img.style.opacity = '1';
            }, 150);
            
            counter.textContent = currentIndex + 1;
        }

        function nextImage(e) {
            if(e) e.stopPropagation();
            currentIndex = (currentIndex + 1) % currentGallery.length;
            updateLightboxImage();
        }

        function prevImage(e) {
            if(e) e.stopPropagation();
            currentIndex = (currentIndex - 1 + currentGallery.length) % currentGallery.length;
            updateLightboxImage();
        }

        function handleLightboxKey(e) {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        }

        window.onload = renderHome;
    </script>
</body>
</html>
